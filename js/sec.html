<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function add7(num){
            return num + 7;
        }
        function multiply(num1, num2){
            return num1 * num2;
        }
        function capitalize(inp){
            return inp.slice(0,1).toUpperCase() + inp.slice(1).toLowerCase()
        }
        function lastLetter(inp){
            return inp.charAt(inp.length - 1)
        }
        console.log(capitalize("aBcD"))
        console.log(lastLetter("hello"))
        console.log(multiply(3, 2))
        console.log(add7(10))
    </script>
</body>
</html>
